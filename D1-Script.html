document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"50d134c8-2593-443b-9302-581ef576e76d\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box}\nbody{margin:0;background:#16140F}\n::selection{background:#F4E3A3}\ninput:focus,textarea:focus{border-color:#3A352C !important}\ntextarea,input,button{font-family:inherit}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"font-family:-apple-system,'Helvetica Neue',Helvetica,system-ui,sans-serif;min-height:100vh;background:#16140F;color:#F0ECE3;display:flex;flex-direction:column\">\n\n  <header style=\"height:60px;flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:0 22px;background:#232019;border-bottom:1px solid #34302A;position:sticky;top:0;z-index:5\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <div style=\"width:27px;height:27px;border-radius:7px;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700\">M<\u002Fdiv>\n      <div>\n        <div style=\"font-size:14px;font-weight:700;color:#F0ECE3;line-height:1.1\">Mortgage Protection<\u002Fdiv>\n        <div style=\"font-size:11px;color:#BCB5A8;font-weight:500\">Field Underwriter Call<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ saveInv }}\" style=\"margin-left:8px;background:#22A06B;border:none;color:#FFFFFF;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap\">Save Inv. Sheet<\u002Fbutton>\n    <\u002Fdiv>\n    <sc-if value=\"{{ showProgress }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;gap:6px;min-width:240px;max-width:340px;flex:1\">\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#BCB5A8;font-weight:600\">{{ stageLabel }}<\u002Fdiv>\n        <div style=\"height:4px;background:#34302A;border-radius:2px;overflow:hidden\"><div style=\"height:100%;background:#D6A94A;border-radius:2px;width:{{ progressPct }};transition:width .25s\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <button onclick=\"{{ toggleWhy }}\" style=\"background:transparent;border:1px solid #6A6253;color:#EDE7DA;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer\">\"Why\" Questions<\u002Fbutton>\n      <button onclick=\"{{ togglePmi }}\" style=\"background:transparent;border:1px solid #6A6253;color:#EDE7DA;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer\">PMI, Homeowners &amp; MPI<\u002Fbutton>\n      <button onclick=\"{{ toggleObj }}\" style=\"background:#E7E2D7;border:none;color:#1A1813;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer\">Objections<\u002Fbutton>\n      <button onclick=\"{{ toggleObjAfter }}\" style=\"background:#E7E2D7;border:none;color:#1A1813;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer\">Objections ~ After Inv.<\u002Fbutton>\n      <button onclick=\"{{ reset }}\" style=\"background:transparent;border:1px solid #6A6253;color:#EDE7DA;padding:9px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer\">New Call<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"flex:1;display:flex;min-height:0\">\n\n    <aside style=\"width:250px;flex:0 0 auto;background:#1E1B16;border-right:1px solid #34302A;padding:18px 14px;display:flex;flex-direction:column;gap:5px;overflow:auto\">\n      <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#ABA499;font-weight:600;padding:0 4px 8px\">Call Flow<\u002Fdiv>\n      <button onclick=\"{{ goIntro }}\" style=\"{{ nav.intro }}\">Intro &amp; Discovery<\u002Fbutton>\n      <button onclick=\"{{ goYes }}\" style=\"{{ nav.yes }}\">— Has coverage (Yes)<\u002Fbutton>\n      <button onclick=\"{{ goNo }}\" style=\"{{ nav.no }}\">— New to it (No)<\u002Fbutton>\n      <button onclick=\"{{ goTie }}\" style=\"{{ nav.tie }}\">Tie Down<\u002Fbutton>\n      <button onclick=\"{{ goPre }}\" style=\"{{ nav.pre }}\">Pre-Close<\u002Fbutton>\n      <button onclick=\"{{ goIul }}\" style=\"{{ nav.iul }}\">— IUL / Term · Living Benefits<\u002Fbutton>\n      <button onclick=\"{{ goWhole }}\" style=\"{{ nav.whole }}\">— Whole · Equity Protection<\u002Fbutton>\n      <button onclick=\"{{ goHelp }}\" style=\"{{ nav.help }}\">Help the Family · Close<\u002Fbutton>\n\n      <div style=\"height:1px;background:#34302A;margin:16px 4px\"><\u002Fdiv>\n\n      <div style=\"font-size:16px;letter-spacing:.005em;color:#F5F1E8;font-weight:700;padding:8px 10px 7px;background:#2A2620;border-left:3px solid #3A352C;border-radius:5px;margin-top:4px;padding:0 4px 8px\">Personalize<\u002Fdiv>\n      <div style=\"padding:0 4px;display:flex;flex-direction:column;gap:12px\">\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Your Name<\u002Flabel>\n          <input value=\"{{ agent }}\" onchange=\"{{ onAgent }}\" placeholder=\"Chris Tanner\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Client name<\u002Flabel>\n          <input value=\"{{ client }}\" onchange=\"{{ onClient }}\" placeholder=\"[Client]\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Street<\u002Flabel>\n          <input value=\"{{ street }}\" onchange=\"{{ onStreet }}\" placeholder=\"[Street]\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Beneficiary<\u002Flabel>\n          <input value=\"{{ beneficiary }}\" onchange=\"{{ onBeneficiary }}\" placeholder=\"[Beneficiary]\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:#34302A;margin:16px 4px\"><\u002Fdiv>\n      <div style=\"font-size:16px;letter-spacing:.005em;color:#F5F1E8;font-weight:700;background:#2A2620;border-left:3px solid #3A352C;border-radius:5px;padding:8px 10px 7px;margin:0 4px\">Client Information<\u002Fdiv>\n      <div style=\"padding:0 4px;display:flex;flex-direction:column;gap:12px;margin-top:6px\">\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Name<\u002Flabel>\n          <input value=\"{{ client }}\" onchange=\"{{ onClient }}\" placeholder=\"Client name\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Street<\u002Flabel>\n          <input value=\"{{ street }}\" onchange=\"{{ onStreet }}\" placeholder=\"Street\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Beneficiary<\u002Flabel>\n          <input value=\"{{ beneficiary }}\" onchange=\"{{ onBeneficiary }}\" placeholder=\"Beneficiary\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Phone Number<\u002Flabel>\n          <input value=\"{{ phone }}\" onchange=\"{{ on_phone }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Email<\u002Flabel>\n          <input value=\"{{ email }}\" onchange=\"{{ on_email }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">SSN<\u002Flabel>\n          <input value=\"{{ ssn }}\" onchange=\"{{ on_ssn }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Drivers License<\u002Flabel>\n          <input value=\"{{ dl }}\" onchange=\"{{ on_dl }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Bank<\u002Flabel>\n          <input value=\"{{ bank }}\" onchange=\"{{ on_bank }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Routing<\u002Flabel>\n          <input value=\"{{ routing }}\" onchange=\"{{ on_routing }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Account<\u002Flabel>\n          <input value=\"{{ account }}\" onchange=\"{{ on_account }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Carrier<\u002Flabel>\n          <input value=\"{{ carrier }}\" onchange=\"{{ on_carrier }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Face Amount<\u002Flabel>\n          <input value=\"{{ newFace }}\" onchange=\"{{ on_newFace }}\" placeholder=\"$\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Premium<\u002Flabel>\n          <input value=\"{{ newPremium }}\" onchange=\"{{ on_newPremium }}\" placeholder=\"$\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Policy #<\u002Flabel>\n          <input value=\"{{ policyNum }}\" onchange=\"{{ on_policyNum }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:#34302A;margin:6px 4px\"><\u002Fdiv>\n      <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#ABA499;font-weight:600;padding:0 4px\">Notes<\u002Flabel>\n      <textarea value=\"{{ notes }}\" onchange=\"{{ onNotes }}\" placeholder=\"Jot client answers as you go…\" style=\"width:calc(100% - 8px);margin:6px 4px 0;min-height:260px;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:10px 11px;font-size:14px;color:#F0ECE3;outline:none;resize:vertical;line-height:1.55\"><\u002Ftextarea>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"font-size:11px;color:#ABA499;padding:14px 4px 0;line-height:1.5\">Filling these in swaps every <span style=\"background:#F4E3A3;padding:0 4px;border-radius:3px;color:#1F1B12;font-weight:600\">[bracket]<\u002Fspan> in the script.<\u002Fdiv>\n    <\u002Faside>\n\n    \n\n    <main style=\"flex:1;overflow:auto;padding:40px 36px;display:flex;justify-content:center\">\n      <div style=\"background:#232019;border:1px solid #34302A;border-radius:6px;padding:44px 52px;max-width:800px;width:100%;box-shadow:0 1px 2px rgba(0,0,0,.04);font-size:{{ baseFontPx }}\">\n\n        <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#ABA499;margin:0 0 1.4em 0;font-weight:600\">Intro · Opening<\u002Fdiv>\n            <p style=\"font-size: 1.44em; line-height: 1.62; color: #E7E2D7; margin: 0 0 0.85em 0; position: relative\">Hi <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan>, this is <i><u><span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ agentTok }}<\u002Fspan><\u002Fu><\u002Fi>&nbsp;speaking, Field Underwriter. I had to get in contact with you about your mortgage here on <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ streetTok }}<\u002Fspan><\u002Fp><p style=\"margin: 0; font-size: 16px; line-height: 1; font-family: ui-monospace, Menlo, monospace; position: absolute; left: 196px; top: 11px\">Your text here<\u002Fp><p><\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">Now, <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan> I handle all the mortgage protection files at the brokerage….<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">I HAVE your file here… it says marked for review.<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">When you closed on the home, you were expected to receive a call from an underwriter about this protection <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan>. The one that would <strong>pay off your home for you and your family in the event of an illness or passing<\u002Fstrong>…… — right….<\u002Fp>\n            <div style=\"height:1px;background:#34302A;margin:1.6em 0\"><\u002Fdiv>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;margin:0 0 1em 0;font-weight:600\">↓ Ask<\u002Fdiv>\n            <p style=\"font-size:1.55em;font-weight:600;line-height:1.45;color:#F5F1E8;margin:0 0 1.3em 0\">Did anybody reach out to you about this protection <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan>—because I'm not seeing any notes on my side<\u002Fp>\n            <div style=\"display:flex;gap:14px\">\n              <button onclick=\"{{ goYes }}\" style=\"flex:1;border:1.5px solid #2E4A3A;background:#19271F;padding:16px 18px;border-radius:11px;text-align:left;cursor:pointer\">\n                <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#5FB088;margin-bottom:5px;font-weight:600\">If yes<\u002Fdiv>\n                <div style=\"font-size:16px;font-weight:600;color:#F0ECE3\">Someone reached out →<\u002Fdiv>\n              <\u002Fbutton>\n              <button onclick=\"{{ goNo }}\" style=\"flex:1;border:1.5px solid #4A3C28;background:#272016;padding:16px 18px;border-radius:11px;text-align:left;cursor:pointer\">\n                <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;margin-bottom:5px;font-weight:600\">If no<\u002Fdiv>\n                <div style=\"font-size:16px;font-weight:600;color:#F0ECE3\">Nobody did →<\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isYes }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <button onclick=\"{{ goIntro }}\" style=\"background:transparent;border:none;color:#BCB5A8;font-size:13px;cursor:pointer;padding:0 0 4px;margin-bottom:18px;font-weight:600\">← Back to Intro<\u002Fbutton>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#5FB088;margin:0 0 1.4em 0;font-weight:600\">If yes · They have coverage<\u002Fdiv>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">Perfect — that's actually why I'm calling, <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan>.<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">I expect you got a notice that a senior underwriter would be following up on your mortgage protection coverage. That's me.<\u002Fp>\n            \n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">My job's simple — Since it is under review we need to&nbsp;<strong>make sure everything's in order<\u002Fstrong>. That your coverage is active, and <strong>it'll actually pay out when your family needs it<\u002Fstrong>.<\u002Fp><p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">&nbsp;What company of ours are you sending your monthly premium to?<\u002Fp>\n            <div style=\"height:1px;background:#34302A;margin:1.6em 0\"><\u002Fdiv>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;margin:0 0 1em 0;font-weight:600\">↓ Lead into the inventory sheet<\u002Fdiv>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">Now, what we're going to do is <strong>make sure they didn't place you in the wrong health category<\u002Fstrong> to begin with. — I don't know if you're aware of this, but there are 46 carriers in the state that offer this kind of coverage. Every one of them have different monthly premiums for the same amount of coverage you carry. It's all based on your age &amp; health,… so… if you happen to be sitting in the wrong health category, that means you're <strong>paying more than you should<\u002Fstrong> for that policy. <strong>Does that make sense?<\u002Fstrong><\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\"><\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">So I'm going to walk you through a few medical questions to bring your health profile up to date. <b>Are you a smoker or non-smoker?&nbsp;<\u002Fb><\u002Fp>\n            <div style=\"margin:0 0 1.1em 0;background:#2A2620;border-radius:8px;padding:14px 16px\">\n              <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:600;margin-bottom:7px\">↳ Do this — run the inventory sheet<\u002Fdiv>\n              <div style=\"font-size:14px;line-height:1.55;color:#6B665C\">Go through the <strong style=\"color:#F0ECE3\">inventory sheet<\u002Fstrong> now. While you're filling it out, work in the line below — saying it <em>during<\u002Fem> the inventory sheet sets up your transition into the presentation once the sheet is finished.<\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">I want you to keep in mind — by the end of this, we'll find out one of two things. One: you get <strong>peace of mind<\u002Fstrong> knowing you're not overpaying for your coverage. Or, on the other hand, we find out you ARE overpaying — and I'll be able to <strong>put money back in your pocket<\u002Fstrong> while keeping your <b>coverage you have right now ~ the <\u002Fb><strong>exact same.<\u002Fstrong>&nbsp;Or hey — if you're satisfied with your current premium, we can use that same amount to get you <strong>extra coverage to leave behind for your loved ones<\u002Fstrong>. <strong>Does that make sense?<\u002Fstrong><\u002Fp>\n            <button onclick=\"{{ goPre }}\" style=\"background:#E7E2D7;color:#1A1813;border:none;padding:14px 24px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;margin-top:0.6em\">Continue to Pre-Close →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isNo }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <button onclick=\"{{ goIntro }}\" style=\"background:transparent;border:none;color:#BCB5A8;font-size:13px;cursor:pointer;padding:0 0 4px;margin-bottom:18px;font-weight:600\">← Back to Intro<\u002Fbutton>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;margin:0 0 1.4em 0;font-weight:600\">If no · First they're hearing of it<\u002Fdiv>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">Okay, well <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan> <strong>good thing I reached out<\u002Fstrong> so we can get this taken care of.<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 1.3em 0\"><span style=\"color:#5A5347\">–—<\u002Fspan> Since this is your first time hearing about this protection…<\u002Fp>\n            <button onclick=\"{{ goTie }}\" style=\"background:#E7E2D7;color:#1A1813;border:none;padding:14px 24px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer\">Continue to Tie Down →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isTie }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#ABA499;margin:0 0 1.4em 0;font-weight:600\">Tie Down<\u002Fdiv>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">It's very simple <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan>… this is a version of life insurance designed for you to <strong>pay off the mortgage in the event you have an illness or you pass<\u002Fstrong>.<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\"><span style=\"color:#5A5347\">—<\u002Fspan> That being said <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan>... the state just requires me to go over some basic health questions like if you're a smoker or non-smoker….<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\"><span style=\"color: #5A5347;\">—<\u002Fspan> Then from there I'll draw up some options that you &amp; me will go over together.<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">&amp; once we find the right option that meets your needs, <strong>we'll go ahead and get you protected<\u002Fstrong>. <strong>Does that make sense?<\u002Fstrong><\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.6em 0\"><span style=\"color:#5A5347\">—<\u002Fspan> Now real quick, God forbid something happens, <strong>who is going to be the one to take over the home?<\u002Fstrong><\u002Fp>\n            <p style=\"margin:0 0 0.85em 0\"><span style=\"background:#F4E3A3;color:#1F1B12;padding:2px 8px;border-radius:4px;font-weight:600;font-size:1.1em\">[Get beneficiary real quick]<\u002Fspan><\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 1.3em 0\"><span style=\"color:#5A5347\">–—<\u002Fspan> Ok. &amp; <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan>. Are you a smoker or non-smoker?<\u002Fp>\n            <button onclick=\"{{ goPre }}\" style=\"background:#E7E2D7;color:#1A1813;border:none;padding:14px 24px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer\">Continue to Pre-Close →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isPre }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#ABA499;margin:0 0 1.4em 0;font-weight:600\">Pre-Close · Preempting the Decision<\u002Fdiv>\n            <sc-if value=\"{{ showDir }}\" hint-placeholder-val=\"{{ true }}\">\n              <p style=\"font-size:1.12em;line-height:1.5;color:#ABA499;font-style:italic;margin:0 0 1em 0\">(during the end of inv. sheet)<\u002Fp>\n            <\u002Fsc-if>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\"><span style=\"color: #5A5347;\">—<\u002Fspan> Is there anybody else who needs to be a part of this conversation for you to feel good moving forward once we go over the numbers — like {{ beneTok }} or anyone elser? Or are you <strong>able to make that decision on your own?<\u002Fstrong><\u002Fp>\n            <sc-if value=\"{{ showDir }}\" hint-placeholder-val=\"{{ true }}\">\n              <p style=\"font-size:1.12em;line-height:1.5;color:#ABA499;font-style:italic;margin:0 0 1.3em 0\">(If they need spouse / partner otp,.. finish inv sheet and set appointment)<\u002Fp>\n            <\u002Fsc-if>\n            <div style=\"height:1px;background:#34302A;margin:1.6em 0\"><\u002Fdiv>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;margin:0 0 1em 0;font-weight:600\">↓ Transition into the presentation<\u002Fdiv>\n            <div style=\"display:flex;gap:14px;margin-bottom:1.4em\">\n              <button onclick=\"{{ goIul }}\" style=\"flex:1;border:1.5px solid #3A352E;background:#2A2620;padding:18px 20px;border-radius:11px;text-align:left;cursor:pointer\">\n                <div style=\"font-size:18px;font-weight:700;color:#F0ECE3;letter-spacing:.02em\">IUL / TERM<\u002Fdiv>\n                <div style=\"font-size:13px;color:#BCB5A8;margin-top:4px;font-weight:500\">Living Benefits<\u002Fdiv>\n              <\u002Fbutton>\n              <button onclick=\"{{ goWhole }}\" style=\"flex:1;border:1.5px solid #3A352E;background:#2A2620;padding:18px 20px;border-radius:11px;text-align:left;cursor:pointer\">\n                <div style=\"font-size:18px;font-weight:700;color:#F0ECE3;letter-spacing:.02em\">WHOLE<\u002Fdiv>\n                <div style=\"font-size:13px;color:#BCB5A8;margin-top:4px;font-weight:500\">Equity Protection<\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isIul }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <button onclick=\"{{ goPre }}\" style=\"background:transparent;border:none;color:#BCB5A8;font-size:13px;cursor:pointer;padding:0 0 4px;margin-bottom:18px;font-weight:600\">← Back to Pre-Close<\u002Fbutton>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#ABA499;margin:0 0 0.5em 0;font-weight:600\">Presentation<\u002Fdiv>\n            <div style=\"font-size:1.7em;font-weight:700;color:#F5F1E8;letter-spacing:-.01em\">IUL / Term<\u002Fdiv>\n            <div style=\"font-size:1.1em;color:#BCB5A8;font-weight:500;margin-top:2px\">Living Benefits<\u002Fdiv>\n\n            <div style=\"height:1px;background:#34302A;margin:1.6em 0\"><\u002Fdiv>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;margin:0 0 1.4em 0;font-weight:600\">Value-Building Questions<\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">1<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">Okay, <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan> — I just want to make sure I understand your situation correctly. You're a <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">[occupation]<\u002Fspan>, is that right?<\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">2<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">And that role requires you to be physically strong, mobile, and mentally sharp — would you say that's accurate?<\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">3<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">So if something happened — an illness or injury — that took away your strength, mobility, or mental clarity for a while, realistically, <strong>could you still do your job the way you do it now?<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">4<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">So you'd be unable to work, at least for a period.<\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">5<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">And if you're not working, that income — the <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">[$amount]<\u002Fspan> — <strong>stops coming in<\u002Fstrong>. Is that right?<\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">6<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">You mentioned you're a main contributor in the household. If that income stopped, how long do you think you and <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">[Beneficiaries]<\u002Fspan> could comfortably cover expenses — mortgage, bills, everything — <strong>before it became a real problem?<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">7<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">And what happens after <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">[X months]<\u002Fspan>? Would you be looking at dipping into savings, borrowing, maybe even <strong>selling the home?<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">8<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">So realistically, an extended illness could <strong>change your family's day-to-day life pretty significantly<\u002Fstrong> — not just financially, but how you live.<\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">9<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">Here's why I'm asking all this, <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan> — not to stress you out, but because this is a real, well-documented gap. Medical issues are the <strong>leading cause of bankruptcy<\u002Fstrong> in this country, and illness-driven income loss is a major contributor to foreclosure too — often more than people expect, and more than death itself causes in a given year. Most people have planned for if I die, but <strong>very few have a plan for if I get sick or hurt and can't work<\u002Fstrong>. It sounds like that's a <strong>real exposure<\u002Fstrong> for you and <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">[Beneficiaries]<\u002Fspan> too.<\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 0.7em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">10<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\"><strong>Have you ever heard of living benefits?<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n            <div style=\"margin:0 0 1.1em 44px;background:#2A2620;border-radius:8px;padding:14px 16px\">\n              <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:600;margin-bottom:7px\">→ Explain<\u002Fdiv>\n              <div style=\"font-size:14px;line-height:1.55;color:#6B665C\">Riders that let you access a portion of your own death benefit while still alive, if diagnosed with a qualifying critical, chronic, or terminal illness — tax-free, paid directly to you, no restrictions on use.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">11<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">So in other words, that payout is what would let you and <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">[Beneficiaries]<\u002Fspan> <strong>stay in your home and keep your lifestyle intact<\u002Fstrong> well past that <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">[X-month]<\u002Fspan> breaking point — while you focus on recovering instead of how to make ends meet. <strong>Does that make sense for your situation?<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 1.1em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">12<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">Okay — so knowing that, I'd say it's worth making sure whatever policy we look at <strong>includes living benefits<\u002Fstrong>. Fair?<\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 0.7em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">13<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">There are two main ways to get there: term and IUL.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"margin:0 0 1.1em 44px;border:1px solid #34302A;border-radius:10px;overflow:hidden\">\n              <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:600;padding:12px 16px 4px\">→ Explain both<\u002Fdiv>\n              <div style=\"display:flex\">\n                <div style=\"flex:1;padding:8px 16px 16px;border-right:1px solid #34302A\">\n                  <div style=\"font-size:14px;font-weight:700;color:#F0ECE3;margin-bottom:4px\">Term<\u002Fdiv>\n                  <div style=\"font-size:13.5px;line-height:1.5;color:#6B665C\">Temporary protection in place ~ once expired, no return of premium + <i>possible<\u002Fi> renewal for much higher premium.<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;padding:8px 16px 16px\">\n                  <div style=\"font-size:14px;font-weight:700;color:#F0ECE3;margin-bottom:4px\">IUL<\u002Fdiv>\n                  <div style=\"font-size:13.5px;line-height:1.5;color:#6B665C\">Lasts your whole life, with cash value that grows alongside it. No need to worry about premiums increasing.&nbsp;<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;margin:0 0 0.4em 0;align-items:flex-start\">\n              <div style=\"flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#E7E2D7;color:#1A1813;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:ui-monospace,Menlo,monospace;margin-top:3px\">14<\u002Fdiv>\n              <p style=\"font-size:1.44em;line-height:1.6;color:#E7E2D7;margin:0;flex:1\">Given what we just talked about — needing this protection in place for a defined period vs. wanting it to last your whole life with cash value that grows alongside it — <strong>which feels like a better fit for where you're at?<\u002Fstrong><\u002Fp>\n            <\u002Fdiv>\n\n            <div style=\"height:1px;background:#34302A;margin:1.6em 0\"><\u002Fdiv>\n            <button onclick=\"{{ goHelp }}\" style=\"background:#E7E2D7;color:#1A1813;border:none;padding:14px 26px;border-radius:9px;font-size:15px;font-weight:700;letter-spacing:.03em;cursor:pointer\">HELP THE FAMILY →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isWhole }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <button onclick=\"{{ goPre }}\" style=\"background:transparent;border:none;color:#BCB5A8;font-size:13px;cursor:pointer;padding:0 0 4px;margin-bottom:18px;font-weight:600\">← Back to Pre-Close<\u002Fbutton>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#ABA499;margin:0 0 0.5em 0;font-weight:600\">Presentation<\u002Fdiv>\n            <div style=\"font-size:1.7em;font-weight:700;color:#F5F1E8;letter-spacing:-.01em\">Whole Life<\u002Fdiv>\n            <div style=\"font-size:1.1em;color:#BCB5A8;font-weight:500;margin-top:2px\">Equity Protection<\u002Fdiv>\n\n            <div style=\"height:1px;background:#34302A;margin:1.6em 0\"><\u002Fdiv>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;margin:0 0 1.4em 0;font-weight:600\">The Pitch<\u002Fdiv>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">Now that we've got your health profile updated, let me show you what this is really designed to do — it gives <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ beneTok }}<\u002Fspan> something most families never have in that moment: <strong>time, and options<\u002Fstrong>.<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">Here's what I mean. Right when they'd be facing the hardest days of their life, this steps in and <strong>takes the mortgage off their plate for a full year<\u002Fstrong>. No scramble, no pressure — just room to catch their breath and decide, <strong>on their own terms<\u002Fstrong>, what's best for them and the home.<\u002Fp>\n            <p style=\"font-size:1.44em;line-height:1.62;color:#E7E2D7;margin:0 0 0.85em 0\">And if they choose to sell, <strong>they're not rushed<\u002Fstrong>. They get the time to do it right — instead of your <span style=\"background: rgb(244, 227, 163); color: rgb(31, 27, 18); padding: 1px 6px; border-radius: 3px; font-weight: 600; white-space: nowrap;\">[relation to bene]<\u002Fspan> being forced to sell the home for&nbsp;<strong>far less than it's true worth<\u002Fstrong>, just because they couldn't carry the mortgage and their own bills at the same time. <strong>Does that make sense?<\u002Fstrong><\u002Fp>\n\n            <div style=\"height:1px;background:#34302A;margin:1.6em 0\"><\u002Fdiv>\n            <button onclick=\"{{ goHelp }}\" style=\"background:#E7E2D7;color:#1A1813;border:none;padding:14px 26px;border-radius:9px;font-size:15px;font-weight:700;letter-spacing:.03em;cursor:pointer\">HELP THE FAMILY →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isHelp }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:0.7em;letter-spacing:.14em;text-transform:uppercase;color:#ABA499;margin:0 0 0.5em 0;font-weight:600\">Presentation · Close<\u002Fdiv>\n            <div style=\"font-size:1.7em;font-weight:700;color:#F5F1E8;letter-spacing:-.01em\">Help the Family<\u002Fdiv>\n\n            <div style=\"margin:1.4em 0 1.6em;background:#2A2620;border-radius:8px;padding:14px 16px\">\n              <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:600;margin-bottom:7px\">→ Say it just like this for all options<\u002Fdiv>\n              <div style=\"font-size:14px;line-height:1.55;color:#6B665C\">Walk all three the exact same way, then ask the closing question.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:1.6em\">\n              <div style=\"display:flex;gap:14px;align-items:center;border:1px solid #34302A;border-radius:10px;padding:14px 18px\">\n                <div style=\"flex:0 0 auto;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:700\">Opt 1<\u002Fdiv>\n                <div style=\"font-size:1.3em;color:#E7E2D7;font-weight:500\"><span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">$____<\u002Fspan> in coverage is <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">$____<\u002Fspan>/mo<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px;align-items:center;border:1px solid #34302A;border-radius:10px;padding:14px 18px\">\n                <div style=\"flex:0 0 auto;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:700\">Opt 2<\u002Fdiv>\n                <div style=\"font-size:1.3em;color:#E7E2D7;font-weight:500\"><span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">$____<\u002Fspan> in coverage is <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">$____<\u002Fspan>/mo<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px;align-items:center;border:1px solid #34302A;border-radius:10px;padding:14px 18px\">\n                <div style=\"flex:0 0 auto;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:700\">Opt 3<\u002Fdiv>\n                <div style=\"font-size:1.3em;color:#E7E2D7;font-weight:500\"><span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">$____<\u002Fspan> in coverage is <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">$____<\u002Fspan>/mo<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <p style=\"font-size:1.55em;font-weight:600;line-height:1.45;color:#F5F1E8;margin:0\">Now — Out of these 3 options here, <strong>which one is going to meet your needs<\u002Fstrong> with this protecting <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ beneTok }}<\u002Fspan> but at the same time <strong>most affordable for you to keep?<\u002Fstrong><\u002Fp>\n\n            <div style=\"height:1px;background:#34302A;margin:1.6em 0\"><\u002Fdiv>\n            <button onclick=\"{{ reset }}\" style=\"background:transparent;border:1px solid #6A6253;color:#EDE7DA;padding:12px 22px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer\">↺ Start New Call<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fmain><aside style=\"width:322px;flex:0 0 auto;background:#1E1B16;border-left:1px solid #34302A;padding:18px 16px;display:flex;flex-direction:column;gap:14px;overflow:auto\">\n      <div style=\"font-size:16px;letter-spacing:.005em;color:#F5F1E8;font-weight:700;padding:8px 10px 7px;background:#2A2620;border-left:3px solid #3A352C;border-radius:5px;margin-top:4px\">Capture<\u002Fdiv>\n      <div>\n        <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Smoker<\u002Flabel>\n        <div style=\"display:flex;gap:8px\">\n          <button onclick=\"{{ setSmokeNon }}\" style=\"{{ seg.non }}\">Non-smoker<\u002Fbutton>\n          <button onclick=\"{{ setSmokeSmoke }}\" style=\"{{ seg.smoke }}\">Smoker<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <div style=\"flex:1\">\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Height<\u002Flabel>\n          <input value=\"{{ height }}\" onchange=\"{{ onHeight }}\" placeholder=\"5'10&quot;\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n        <div style=\"flex:1\">\n          <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Weight<\u002Flabel>\n          <input value=\"{{ weight }}\" onchange=\"{{ onWeight }}\" placeholder=\"lbs\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">DOB {{ ageLabel }}<\u002Flabel>\n        <input type=\"date\" value=\"{{ dob }}\" onchange=\"{{ onDob }}\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n      <\u002Fdiv>\n\n      <div style=\"height:1px;background:#34302A;margin:2px 0\"><\u002Fdiv>\n      <div style=\"font-size:16px;letter-spacing:.005em;color:#F5F1E8;font-weight:700;padding:8px 10px 7px;background:#2A2620;border-left:3px solid #3A352C;border-radius:5px;margin-top:4px\">Financial<\u002Fdiv>\n      <div>\n        <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Occupation<\u002Flabel>\n        <input value=\"{{ occupation }}\" onchange=\"{{ onOccupation }}\" placeholder=\"What they do\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Monthly Income<\u002Flabel>\n        <input value=\"{{ income }}\" onchange=\"{{ onIncome }}\" placeholder=\"$\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n      <\u002Fdiv>\n      <sc-if value=\"{{ showTwo }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border-top:1px dashed #34302A;padding-top:10px;display:flex;flex-direction:column;gap:12px\">\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600\">Second person<\u002Fdiv>\n          <div>\n            <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Occupation 2<\u002Flabel>\n            <input value=\"{{ occupation2 }}\" onchange=\"{{ onOccupa
