Premium }}\" placeholder=\"$\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">Face Amount<\u002Flabel>\n        <input value=\"{{ lifeFace }}\" onchange=\"{{ on_lifeFace }}\" placeholder=\"$\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"font-family:ui-monospace,Menlo,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#ABA499;font-weight:600;display:block;margin-bottom:5px\">When &amp; What Type<\u002Flabel>\n        <input value=\"{{ lifeWhenType }}\" onchange=\"{{ on_lifeWhenType }}\" placeholder=\"\" style=\"width:100%;border:1px solid #3A352E;background:#232019;border-radius:7px;padding:8px 10px;font-size:14px;color:#F0ECE3;outline:none\">\n      <\u002Fdiv>\n\n    <\u002Faside>\n\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ isObjOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ toggleObj }}\" style=\"position:fixed;inset:0;background:rgba(20,18,14,.3);z-index:20;display:flex;justify-content:flex-end\">\n      <div onclick=\"{{ onPanelClick }}\" style=\"width:440px;max-width:92vw;height:100%;background:#232019;padding:26px 28px;box-shadow:-8px 0 30px rgba(0,0,0,.14);display:flex;flex-direction:column;gap:14px;overflow:auto\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div style=\"font-size:18px;font-weight:700;color:#F0ECE3\">Objections &amp; Rebuttals<\u002Fdiv>\n          <button onclick=\"{{ toggleObj }}\" style=\"background:transparent;border:none;color:#BCB5A8;font-size:22px;cursor:pointer;line-height:1;padding:0\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;color:#ABA499;line-height:1.5\">Quick-access rebuttals — glance at whichever fits, then keep moving.<\u002Fdiv>\n\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px\">\n          <div style=\"font-size:20px;color:#E8645A;font-weight:700;margin-bottom:9px;letter-spacing:.005em\">Not Interested<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">Honestly <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan> I get it…... Correct me if I'm wrong — I'm assuming if this made sense… &amp; was affordable….. The least you would want is being able to <strong>keep the home if something unexpected happens to you?<\u002Fstrong> — <strong>Is that correct?<\u002Fstrong> <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan><\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px\">\n          <div style=\"font-size:20px;color:#E8645A;font-weight:700;margin-bottom:9px;letter-spacing:.005em\">Not Interested · Bite<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0 0 8px\">— I have 2 rules of thumb I always follow when I help someone.<\u002Fp>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">1….. This needs to be <strong>crystal clear<\u002Fstrong>, Secondly and most importantly this <strong>NEEDS to be affordable<\u002Fstrong>. If we can't meet those rules I'll tell you first that <strong>this is not for you<\u002Fstrong>. <strong>Is that fair?<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px\">\n          <div style=\"font-size:20px;color:#E8645A;font-weight:700;margin-bottom:9px;letter-spacing:.005em\">Call Back · Intro<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">Real quick before I do — I just want to make sure this is even relevant for you. Did anyone ever call you about the protection that will <strong>pay off your home for you and your family<\u002Fstrong> if you ever become ill, or pass away?<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px;background:#2A2620\">\n          <div style=\"font-size:20px;color:#E8645A;font-weight:700;margin-bottom:9px;letter-spacing:.005em\">Who Are You / Who Do You Work For?<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">I work with <strong>Pinnacle Life Group<\u002Fstrong>. We're an independent firm licensed by the state to handle mortgage protection files, again my name is <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 6px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ agentTok }}<\u002Fspan>, I've been assigned to your file about the protection that would <strong>pay for the home in the event you become ill or god forbid pass<\u002Fstrong>. We had an underwriter give you a call awhile back but I don't see notes saying you took care of this. <strong>Do you know if they ever reached out?<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px\">\n          <div style=\"font-size:20px;color:#E8645A;font-weight:700;margin-bottom:9px;letter-spacing:.005em\">No Mtg / Sold / Don't Live There<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">\"That's great — X.Y.Z! A mortgage is just one reason people carry life insurance. The bigger question is: <strong>if something happened to you tomorrow, how would it look, financially speaking for your family?<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px\">\n          <div style=\"font-size:20px;color:#E8645A;font-weight:700;margin-bottom:9px;letter-spacing:.005em\">Work Coverage<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0 0 8px\">Here's something most of my clients don't realize — <strong>that work policy technically isn't yours… unfortunately it's your employer's.<\u002Fstrong> Meaning they can cut it, restructure it, or change carriers anytime, and there's nothing you could really do about it. Did you know that?<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:#ABA499;font-style:italic;margin:0 0 8px\">[pause for response]<\u002Fp>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0 0 8px\">And here's the part that really gets people — when you retire, the employee premium goes away meaning an <strong>unaffordable price you'd have to pay<\u002Fstrong>, or on the other hand you're left with <strong>zero insurance<\u002Fstrong>. Basically leaving you stuck trying to find coverage later down the road, when your age and health would make it way harder to qualify or even afford.<\u002Fp>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">That's why I tell people — <strong>keep the work coverage, but also own a small private policy of your own<\u002Fstrong>. If you think about it. Your boss doesn't take care of your family, you do. So let's make sure we protect them whether you're working…<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:#ABA499;font-style:italic;margin:8px 0 0\">(Go back into wherever you are in roadmap)<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#ABA499;font-weight:700;margin-top:4px\">Your own notes<\u002Fdiv>\n        <textarea value=\"{{ rebuttals }}\" onchange=\"{{ onRebuttals }}\" placeholder=\"Add any other rebuttals here…\" style=\"width:100%;min-height:120px;border:1px solid #3A352E;background:#2A2620;border-radius:8px;padding:12px;font-size:14px;color:#F0ECE3;outline:none;resize:vertical;line-height:1.6\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isWhyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ toggleWhy }}\" style=\"position:fixed;inset:0;background:rgba(20,18,14,.3);z-index:20;display:flex;justify-content:flex-end\">\n      <div onclick=\"{{ onPanelClick }}\" style=\"width:440px;max-width:92vw;height:100%;background:#232019;padding:26px 28px;box-shadow:-8px 0 30px rgba(0,0,0,.14);display:flex;flex-direction:column;gap:14px;overflow:auto\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div style=\"font-size:18px;font-weight:700;color:#F0ECE3\">\"Why\" Questions<\u002Fdiv>\n          <button onclick=\"{{ toggleWhy }}\" style=\"background:transparent;border:none;color:#BCB5A8;font-size:22px;cursor:pointer;line-height:1;padding:0\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:15px;font-weight:700;color:#F0ECE3\">Building the \"Why\" — Live Call Jot List<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#ABA499;line-height:1.5;margin-top:2px\">Aged mortgage protection leads · keep next to your phone<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-top:4px\">Open<\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"open\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.open }}\">{{ mark.open }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">Have you ever stopped to think about <strong>what would happen to the house<\u002Fstrong> if something happened to you?<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:4px\">\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;font-weight:700\">Financial Reality<\u002Fdiv>\n          <div style=\"font-size:12px;color:#ABA499;font-style:italic;margin-top:1px\">mid / after inventory sheet<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"fin1\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.fin1 }}\">{{ mark.fin1 }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">If your income stopped today, <strong>how long could you realistically stay in the house?<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"fin2\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.fin2 }}\">{{ mark.fin2 }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">How would <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ beneTok }}<\u002Fspan> make the mortgage work on their own if something happened to you?<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"fin3\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.fin3 }}\">{{ mark.fin3 }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">How would that affect <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ beneTok }}<\u002Fspan> — on top of everything else?<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-top:4px\">Motivation<\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"mot1\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.mot1 }}\">{{ mark.mot1 }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">What's the <strong>biggest thing that's kept this from being in place already?<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"mot2\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.mot2 }}\">{{ mark.mot2 }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">What would be the goal with having something like this in place?<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-top:4px\">Mortality Proximity<\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"mort1\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.mort1 }}\">{{ mark.mort1 }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">Do you know anyone — friend or family — who's <strong>passed away while they still had a mortgage?<\u002Fstrong> <span style=\"color:#ABA499;font-style:italic\">(if yes: what happened?)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-top:4px\">Future Pacing<\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"fut1\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.fut1 }}\">{{ mark.fut1 }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">How would it feel knowing this was in place, and <strong>the mortgage would be taken care of for&nbsp;<strong><span style=\"background: rgb(244, 227, 163); color: rgb(31, 27, 18); padding: 1px 5px; border-radius: 3px; white-space: nowrap; font-size: 13px\">{{ beneTok }}<\u002Fspan><\u002Fstrong>&nbsp;no matter what?<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-top:4px\">Reframe<\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:flex-start\">\n          <div data-id=\"ref1\" onclick=\"{{ toggleCheck }}\" style=\"{{ box.ref1 }}\">{{ mark.ref1 }}<\u002Fdiv>\n          <div style=\"font-size:14.5px;line-height:1.55;color:#E7E2D7\">You've been in the home <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">___<\u002Fspan> years without this — <strong>why does it make sense to put something in place now?<\u002Fstrong><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#ABA499;font-weight:700;margin-top:8px\">Your own notes<\u002Fdiv>\n        <textarea value=\"{{ whyText }}\" onchange=\"{{ onWhy }}\" placeholder=\"Jot anything during the call…\" style=\"width:100%;min-height:110px;border:1px solid #3A352E;background:#2A2620;border-radius:8px;padding:12px;font-size:14px;color:#F0ECE3;outline:none;resize:vertical;line-height:1.6\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isPmiOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ togglePmi }}\" style=\"position:fixed;inset:0;background:rgba(20,18,14,.3);z-index:20;display:flex;justify-content:flex-end\">\n      <div onclick=\"{{ onPanelClick }}\" style=\"width:440px;max-width:92vw;height:100%;background:#232019;padding:26px 28px;box-shadow:-8px 0 30px rgba(0,0,0,.14);display:flex;flex-direction:column;gap:14px;overflow:auto\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div style=\"font-size:18px;font-weight:700;color:#F0ECE3\">PMI, Homeowners &amp; MPI<\u002Fdiv>\n          <button onclick=\"{{ togglePmi }}\" style=\"background:transparent;border:none;color:#BCB5A8;font-size:22px;cursor:pointer;line-height:1;padding:0\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#ABA499;line-height:1.5\">Explaining the 3 types of coverage on the mortgage<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.6;color:#E7E2D7;margin:0\">\"Okay real quick before we dive in… I wanna make sure we're on the same page. We got <strong>3 coverages we expect everyone to have<\u002Fstrong>.<\u002Fp>\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px\">\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:7px\">PMI<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">Protects the lender in case you default on the loan you have with them ~ doesn't even protect you<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px\">\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:7px\">Homeowners<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">Covers any property damage — like if a storm comes rolling through and blows your roof off.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:14px 16px;background:#2A2620\">\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:7px\">Mortgage Protection<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">Is what me and you are talking about. Realistically it's&nbsp;<strong>the more crucial one to have<\u002Fstrong> because…… in the event you become ill, disabled, or God forbid pass. <strong>Your family will be able to keep the home and have the mortgage paid.<\u002Fstrong><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:7px\">ASK THIS RIGHT AFTER EXPLAINING ALL 3 TYPES<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.6;color:#E7E2D7;margin:0\">I expect someone called you about this — <strong>or is this the first time you've spoken to someone regarding mortgage protection?<\u002Fstrong><\u002Fp>\n      <\u002Fdiv><div style=\"font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:7px\">Mortgage Protection<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isObjAfterOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ toggleObjAfter }}\" style=\"position:fixed;inset:0;background:rgba(20,18,14,.3);z-index:20;display:flex;justify-content:flex-end\">\n      <div onclick=\"{{ onPanelClick }}\" style=\"width:480px;max-width:94vw;height:100%;background:#232019;padding:26px 28px;box-shadow:-8px 0 30px rgba(0,0,0,.14);display:flex;flex-direction:column;gap:14px;overflow:auto\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div style=\"font-size:18px;font-weight:700;color:#F0ECE3\">Objections ~ After Inv.<\u002Fdiv>\n          <button onclick=\"{{ toggleObjAfter }}\" style=\"background:transparent;border:none;color:#BCB5A8;font-size:22px;cursor:pointer;line-height:1;padding:0\">×<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #34302A;border-radius:10px;padding:16px 18px\">\n          <div style=\"font-size:20px;letter-spacing:.005em;color:#F5F1E8;font-weight:700;margin-bottom:14px\">It's Too Expensive<\u002Fdiv>\n\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:6px\">Step 1 · Confirm it's not confusion<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0 0 8px\">\"Totally get it, <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ clientTok }}<\u002Fspan> — that's natural, <strong>most of my clients felt the same<\u002Fstrong>. Before we go further, let me ask: is everything about how the program actually works…. clear? Or is there a piece of it you want me to run through again?\"<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:#ABA499;font-style:italic;margin:0 0 16px\">[If confusion → clarify, then go straight back to Step 3. If no confusion → Step 2.]<\u002Fp>\n\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:6px\">Step 2 · Callback close (their words, not yours)<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0 0 8px\">\"Good — then let's go back to why we're here. We're still on the same page of making sure that <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ beneTok }}<\u002Fspan> XYZ <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">[Equity Protection / Mtg Protection]<\u002Fspan> …if you were to pass. <strong>That hasn't changed in the last two minutes, has it?<\u002Fstrong>\"<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:#ABA499;font-style:italic;margin:0 0 16px\">[Wait for agreement — this is your first micro-commitment.]<\u002Fp>\n\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:6px\">Step 3 · Isolate affordability<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0 0 8px\">\"So if it's not about understanding it, and it's not about whether Patricia matters — then <strong>it's really just about the number<\u002Fstrong>. Is that fair to say?\"<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:#ABA499;font-style:italic;margin:0 0 16px\">[Let them answer. This isolates the real objection and gets a second micro-commitment.]<\u002Fp>\n\n          <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#D6A94A;font-weight:700;margin-bottom:6px\">Step 4 · Solve it and close — don't just reassure<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0 0 8px\">\"Then here's the good news — <strong>you're in control of that number, not me<\u002Fstrong>. We don't have to start at the number I showed you. Let's set <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ beneTok }}<\u002Fspan> up today at a lower amount — something that feels easy, not stressful. The mistake people make is waiting for 'the right amount' and <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ beneTok }}<\u002Fspan> ends up with <strong>zero in the meantime<\u002Fstrong>. <strong>Something in place beats nothing in place every time<\u002Fstrong>, I'm sure we can both agree on that… right?<\u002Fp>\n          <p style=\"font-size:14.5px;line-height:1.58;color:#E7E2D7;margin:0\">Glad we're on the same page there. This is what we'll do, since we can always increase it down the road, we'll start off on something that is going to be easier to swing. But <strong>let's not let a dollar amount keep her unprotected today<\u002Fstrong>. Lets start off and get ahead and get <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">{{ beneTok }}<\u002Fspan> set up at <span style=\"background:#F4E3A3;color:#1F1B12;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap\">[lower tier]<\u002Fspan> right now. <strong>You want the physical policy mailed to your home or you want it emailed to you?<\u002Fstrong>\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;scriptScale&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1,&quot;min&quot;:0.8,&quot;max&quot;:1.5,&quot;step&quot;:0.05,&quot;tsType&quot;:&quot;number&quot;},&quot;showDirections&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showProgress&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { view:'intro', client:'', street:'', agent:'', notes:'', beneficiary:'', company:'', smoker:'', saved:true, height:'', weight:'', dob:'', occupation:'', income:'', occupation2:'', income2:'', hhIncome:'', showTwo:false, medsCurrent:'', surgeries:'', pastMedsYes:false, pastMeds:'', bgYes:false, mtgBalance:'', mtgPayment:'', houseValue:'', equity:'', extraPayment:'', lifeCompany:'', lifePremium:'', lifeFace:'', lifeWhenType:'', phone:'', email:'', ssn:'', dl:'', bank:'', routing:'', account:'', carrier:'', newFace:'', newPremium:'', policyNum:'', mtgTerm:'', lifeSource:'', rebuttals:'', whyText:'', checks:{}, objOpen:false, whyOpen:false, pmiOpen:false, objAfterOpen:false };\n\n  componentDidMount(){\n    try{\n      const s = JSON.parse(localStorage.getItem('mp_call')||'{}');\n      if(s && typeof s==='object') this.setState(Object.assign({}, this.state, s, {objOpen:false}));\n    }catch(e){}\n  }\n\n  persist(){\n    try{\n      const {objOpen, whyOpen, pmiOpen, objAfterOpen, ...rest} = this.state;\n      localStorage.setItem('mp_call', JSON.stringify(rest));\n    }catch(e){}\n  }\n\n  set(key,val){ this.setState({[key]:val, saved:false}, ()=>this.persist()); }  go(view){ this.setState({view}, ()=>this.persist()); }\n  reset(){\n    this.setState({ view:'intro', client:'', street:'', agent:this.state.agent, notes:'', beneficiary:'', company:'', smoker:'', saved:true, height:'', weight:'', dob:'', occupation:'', income:'', occupation2:'', income2:'', hhIncome:'', showTwo:false, medsCurrent:'', surgeries:'', pastMedsYes:false, pastMeds:'', bgYes:false, mtgBalance:'', mtgPayment:'', mtgTerm:'', houseValue:'', equity:'', extraPayment:'', lifeSource:'', lifeCompany:'', lifePremium:'', lifeFace:'', lifeWhenType:'', phone:'', email:'', ssn:'', dl:'', bank:'', routing:'', account:'', carrier:'', newFace:'', newPremium:'', policyNum:'', rebuttals:this.state.rebuttals, whyText:this.state.whyText, checks:{}, objOpen:false, whyOpen:false }, ()=>this.persist());\n  }\n\n  hasAnyData(){\n    const st = this.state;\n    const keys = ['client','street','beneficiary','smoker','height','weight','dob','occupation','income','occupation2','income2','hhIncome','medsCurrent','surgeries','pastMeds','mtgBalance','mtgPayment','mtgTerm','houseValue','equity','extraPayment','lifeSource','lifeCompany','lifePremium','lifeFace','lifeWhenType','phone','email','ssn','dl','bank','routing','account','carrier','newFace','newPremium','policyNum','notes'];\n    if (keys.some(k => st[k]!=null && String(st[k]).trim()!=='')) return true;\n    const c = st.checks||{}; if (Object.keys(c).some(k=>c[k])) return true;\n    return false;\n  }\n\n  newCall(){\n    if (!this.state.saved && this.hasAnyData()) {\n      const ok = window.confirm('You haven\\u2019t saved the inventory sheet yet.\\n\\nOK \\u2014 start a new call (this clears everything)\\nCancel \\u2014 go back so you can Save Inv. Sheet first');\n      if (!ok) return;\n    }\n    this.reset();\n  }\n\n  computeAge(d){\n    if(!d) return '';\n    const b = new Date(d); if(isNaN(b)) return '';\n    const now = new Date();\n    let age = now.getFullYear() - b.getFullYear();\n    const m = now.getMonth() - b.getMonth();\n    if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;\n    return (age >= 0 && age < 130) ? String(age) : '';\n  }\n\n  saveInv(){\n    const st = this.state;\n    const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n    const nl = s => esc(s).replace(/\\n/g,'<br>');\n    const has = v => v!=null && String(v).trim()!=='';\n    const condMap = {cd_heart:'Heart Attack',cd_stroke:'Stroke',cd_tia:'TIA',cd_stents:'Stents',cd_chf:'CHF',cd_pacemaker:'Pacemaker',cd_defib:'Defibrillator',cd_cardio:'Cardiomyopathy',cd_cancer:'Cancer',cd_diabetes:'Diabetes',cd_bp:'High Blood Pressure',cd_lupus:'Lupus',cd_ra:'Rheumatoid Arthritis',cd_asthma:'Asthma or COPD',cd_sleep:'Sleep Apnea',cd_anxiety:'Anxiety or Bipolar-Depression',cd_kidney:'Kidney or Liver Disease',cd_alz:\"Alzheimer's-Dementia\",cd_std:'STD-HIV'};\n    const bgMap = {bg_dui:'DUI',bg_reckless:'Reckless Driving',bg_felony:'Felonies',bg_misd:'Misdemeanor'};\n    const chk = st.checks || {};\n    const conds = Object.keys(condMap).filter(k=>chk[k]).map(k=>condMap[k]);\n    const bgs = Object.keys(bgMap).filter(k=>chk[k]).map(k=>bgMap[k]);\n    const age = this.computeAge(st.dob);\n    const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});\n\n    const row = (label,val)=> has(val) ? `<tr><td class=\"l\">${esc(label)}<\u002Ftd><td class=\"v\">${nl(val)}<\u002Ftd><\u002Ftr>` : '';\n    const section = (title,rowsHtml)=> rowsHtml.trim() ? `<h2>${esc(title)}<\u002Fh2><table>${rowsHtml}<\u002Ftable>` : '';\n\n    const dobStr = has(st.dob) ? (esc(st.dob) + (age?` (Age ${age})`:'')) : '';\n    const smokerStr = st.smoker==='non' ? 'Non-smoker' : (st.smoker==='smoker' ? 'Smoker' : '');\n    const lifeStr = st.lifeSource==='private' ? 'Private' : (st.lifeSource==='work' ? 'Work' : '');\n\n    let two = '';\n    if (st.showTwo) { two = row('Occupation (2nd)', st.occupation2) + row('Monthly Income (2nd)', st.income2); }\n\n    const body =\n      section('Health', row('Smoker', smokerStr)+row('Height', st.height)+row('Weight', st.weight)+row('Date of Birth', dobStr)) +\n      section('Financial', row('Occupation', st.occupation)+row('Monthly Income', st.income)+two+row('Total Household Income', st.hhIncome)) +\n      section('Medical Conditions', conds.length ? `<tr><td class=\"v\" colspan=\"2\">${conds.map(esc).join(' · ')}<\u002Ftd><\u002Ftr>` : '') +\n      section('Medications & Surgeries', row('Current Medications', st.medsCurrent)+row('Surgeries / Procedures', st.surgeries)+row('Past 5 yrs meds (stopped)', st.pastMeds)) +\n      section('Background', bgs.length ? `<tr><td class=\"v\" colspan=\"2\">${bgs.map(esc).join(' · ')}<\u002Ftd><\u002Ftr>` : '') +\n      section('Mortgage Information', row('Mortgage Balance', st.mtgBalance)+row('Monthly Mortgage Payment', st.mtgPayment)+row('Mortgage Term', st.mtgTerm?st.mtgTerm+' yr':'')+row('House Value', st.houseValue)+row('Equity', st.equity)+row('Extra Payment to Mtg?', st.extraPayment)) +\n      section('Life Insurance', row('Policy Source', lifeStr)+row('Company', st.lifeCompany)+row('Monthly Premium', st.lifePremium)+row('Face Amount', st.lifeFace)+row('When & What Type', st.lifeWhenType)) +\n      section('Client Information', row('Name', st.client)+row('Street', st.street)+row('Beneficiary', st.beneficiary)+row('Phone Number', st.phone)+row('Email', st.email)+row('SSN', st.ssn)+row(\"Driver's License\", st.dl)+row('Bank', st.bank)+row('Routing', st.routing)+row('Account', st.account)+row('Carrier', st.carrier)+row('Face Amount', st.newFace)+row('Premium', st.newPremium)+row('Policy #', st.policyNum)) +\n      section('Notes', has(st.notes) ? `<tr><td class=\"v\" colspan=\"2\">${nl(st.notes)}<\u002Ftd><\u002Ftr>` : '');\n\n    const clientName = has(st.client) ? esc(st.client) : '—';\n    const doc = `<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>Inventory Sheet — ${clientName}<\u002Ftitle><style>\n      *{box-sizing:border-box} body{font-family:-apple-system,Helvetica,Arial,sans-serif;color:#1A1813;margin:0;padding:40px 48px;font-size:13px}\n      .hd{border-bottom:2px solid #1A1813;padding-bottom:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-end}\n      .hd .t{font-size:22px;font-weight:700} .hd .s{font-size:12px;color:#8A8479;margin-top:3px}\n      .meta{font-size:12px;color:#555;text-align:right;line-height:1.7}\n      h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#9C7A2E;border-bottom:1px solid #E6E2D8;padding-bottom:5px;margin:22px 0 8px}\n      table{width:100%;border-collapse:collapse;margin:0} \n      td{padding:5px 6px;vertical-align:top;border-bottom:1px solid #F0EDE5} \n      td.l{width:210px;color:#746F64;font-weight:600} td.v{color:#1A1813}\n      @media print{body{padding:0.5in 0.6in}}\n    <\u002Fstyle><\u002Fhead><body>\n      <div class=\"hd\"><div><div class=\"t\">Inventory Sheet<\u002Fdiv><div class=\"s\">Mortgage Protection · Field Underwriter<\u002Fdiv><\u002Fdiv>\n      <div class=\"meta\"><strong>${clientName}<\u002Fstrong><br>${has(st.street)?esc(st.street)+'<br>':''}${today}${has(st.agent)?'<br>Agent: '+esc(st.agent):''}<\u002Fdiv><\u002Fdiv>\n      ${body || '<p style=\"color:#999;margin-top:30px\">No information captured yet.<\u002Fp>'}\n    <\u002Fbody><\u002Fhtml>`;\n\n    const w = window.open('', '_blank');\n    if(!w){ alert('Allow pop-ups to save the inventory sheet.'); return; }\n    w.document.open(); w.document.write(doc); w.document.close();\n    w.focus();\n    setTimeout(()=>{ try{ w.print(); }catch(e){} }, 350);\n    this.setState({saved:true}, ()=>this.persist());\n  }\n\n  renderVals(){\n    const st = this.state;\n    const scale = this.props.scriptScale ?? 1;\n    const showDir = this.props.showDirections ?? true;\n    const showProgress = this.props.showProgress ?? true;\n    const client = (st.client||'').trim();\n    const street = (st.street||'').trim();\n    const v = st.view;\n\n    const chk = st.checks || {};\n    const boxOn = 'width:18px;height:18px;border:1.5px solid #E7E2D7;background:#E7E2D7;color:#1A1813;border-radius:4px;flex:0 0 auto;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;cursor:pointer;user-select:none';\n    const boxOff = 'width:18px;height:18px;border:1.5px solid #5A5347;background:#232019;color:#232019;border-radius:4px;flex:0 0 auto;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;cursor:pointer;user-select:none';\n    const ids = ['open','fin1','fin2','fin3','mot1','mot2','mort1','fut1','ref1','cd_heart','cd_stroke','cd_tia','cd_stents','cd_chf','cd_pacemaker','cd_defib','cd_cardio','cd_cancer','cd_diabetes','cd_bp','cd_lupus','cd_ra','cd_asthma','cd_sleep','cd_anxiety','cd_kidney','cd_alz','cd_std','bg_dui','bg_reckless','bg_felony','bg_misd'];\n    const box = {}, mark = {};\n    ids.forEach(id => { box[id] = chk[id] ? boxOn : boxOff; mark[id] = chk[id] ? '\\u2713' : ''; });\n\n    const segPastBase = 'flex:1;padding:9px 8px;border:1px solid #3A352E;background:#232019;color:#CFC8BB;font-size:13px;font-weight:600;cursor:pointer;border-radius:7px';\n    const segPastOn = 'flex:1;padding:9px 8px;border:1px solid #3A352C;background:#E7E2D7;color:#1A1813;font-size:13px;font-weight:600;cursor:pointer;border-radius:7px';\n\n    const navBase = 'display:block;width:100%;text-align:left;border:none;background:transparent;padding:9px 12px;border-radius:7px;font-size:14px;color:#CFC8BB;cursor:pointer;font-weight:500';\n    const navOn = 'display:block;width:100%;text-align:left;border:none;background:#232019;padding:9px 12px;border-radius:7px;font-size:14px;color:#F0ECE3;cursor:pointer;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)';\n    const navSubBase = 'display:block;width:100%;text-align:left;border:none;background:transparent;padding:7px 12px 7px 24px;border-radius:7px;font-size:13px;color:#BCB5A8;cursor:pointer;font-weight:500';\n    const navSubOn = 'display:block;width:100%;text-align:left;border:none;background:#232019;padding:7px 12px 7px 24px;border-radius:7px;font-size:13px;color:#F0ECE3;cursor:pointer;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)';\n    const segBase = 'flex:1;padding:9px 8px;border:1px solid #3A352E;background:#232019;color:#CFC8BB;font-size:13px;font-weight:600;cursor:pointer;border-radius:7px';\n    const segOn = 'flex:1;padding:9px 8px;border:1px solid #3A352C;background:#E7E2D7;color:#1A1813;font-size:13px;font-weight:600;cursor:pointer;border-radius:7px';\n\n    const stageIdx = v==='intro' ? 0 : (v==='yes'||v==='no') ? 1 : v==='tiedown' ? 2 : (v==='iul'||v==='whole') ? 4 : v==='help' ? 5 : 3;\n    const stageNames = ['Intro & Discovery','Discovery','Tie Down','Pre-Close','Presentation','Close'];\n\n    return {\n      clientTok: client || '[Client]',\n      beneTok: (st.beneficiary||'').trim() || '[Beneficiary]',\n      agentTok: (st.agent||'').trim() || 'Your Name',\n      mtgBalance: st.mtgBalance,\n      mtgPayment: st.mtgPayment,\n      houseValue: st.houseValue,\n      equity: st.equity,\n      extraPayment: st.extraPayment,\n      lifeCompany: st.lifeCompany,\n      lifePremium: st.lifePremium,\n      lifeFace: st.lifeFace,\n      lifeWhenType: st.lifeWhenType,\n      phone: st.phone,\n      email: st.email,\n      ssn: st.ssn,\n      dl: st.dl,\n      bank: st.bank,\n      routing: st.routing,\n      account: st.account,\n      carrier: st.carrier, newFace: st.newFace, newPremium: st.newPremium, policyNum: st.policyNum,\n      mtgTerm: st.mtgTerm, lifeSource: st.lifeSource,\n      agent: st.agent,\n      height: st.height, weight: st.weight, dob: st.dob,\n      occupation: st.occupation, income: st.income,\n      occupation2: st.occupation2, income2: st.income2,\n      hhIncome: st.hhIncome,\n      medsCurrent: st.medsCurrent, surgeries: st.surgeries, pastMeds: st.pastMeds,\n      pastMedsYes: !!st.pastMedsYes,\n      bgYes: !!st.bgYes,\n      showTwo: !!st.showTwo,\n      twoLabel: st.showTwo ? '− Remove second person' : '+ Add second person',\n      ageLabel: (()=>{\n        const d = st.dob; if(!d) return '';\n        const b = new Date(d); if(isNaN(b)) return '';\n        const now = new Date();\n        let age = now.getFullYear() - b.getFullYear();\n        const m = now.getMonth() - b.getMonth();\n        if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;\n        return age >= 0 && age < 130 ? '· Age '+age : '';\n      })(),\n      streetTok: street || '[Street]',\n      client: st.client, street: st.street, notes: st.notes,\n      beneficiary: st.beneficiary, company: st.company, rebuttals: st.rebuttals, whyText: st.whyText,\n      isIntro: v==='intro', isYes: v==='yes', isNo: v==='no', isTie: v==='tiedown', isPre: v==='preempt',\n      isIul: v==='iul', isWhole: v==='whole',\n      isHelp: v==='help',\n      isObjOpen: !!st.objOpen,\n      isWhyOpen: !!st.whyOpen,\n      isPmiOpen: !!st.pmiOpen,\n      isObjAfterOpen: !!st.objAfterOpen,\n      box: box, mark: mark,\n      showDir: showDir, showProgress: showProgress,\n      baseFontPx: (16*scale)+'px',\n      progressPct: (((stageIdx+1)/6)*100)+'%',\n      stageLabel: (stageIdx+1)+' / 6 · '+stageNames[stageIdx],\n      nav: {\n        in
